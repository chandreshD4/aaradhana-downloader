name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Re-generate Android Folder Freshly
        run: |
          rm -rf android
          flutter create --org com.example --platforms=android .
          
      # इस एरर को मारने की असली दवा: डिफ़ॉल्ट SDK 33 को 34 से बदलना
      - name: Force Android SDK Version 34
        run: |
          sed -i 's/compileSdkVersion flutter.compileSdkVersion/compileSdkVersion 34/g' android/app/build.gradle
          sed -i 's/targetSdkVersion flutter.targetSdkVersion/targetSdkVersion 34/g' android/app/build.gradle
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      - name: Build VIP APK Freshly
        run: flutter build apk --release
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
