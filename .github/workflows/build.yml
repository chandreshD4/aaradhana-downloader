name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      # बिना किसी एरर के साफ-सुथरा एंड्रॉइड ढांचा तैयार करना
      - name: Auto Create Android Project Structure
        run: |
          rm -rf android
          flutter create . --platforms=android
          
      - name: Get Dependencies
        run: flutter pub get
        
      - name: Build APK
        run: flutter build apk --release
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RajuBhai-Downloader-APK
          path: build/app/outputs/flutter-apk/app-release.apk
