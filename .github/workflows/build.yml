name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Re-generate Android Folder Freshly
        run: |
          rm -rf android
          flutter create --org com.example --platforms=android .
          
      # सीधे build.gradle में compileSdk और targetSdk को 34 पर फोर्स करना
      # इससे audioplayers प्लगइन को उसका पसंदीदा 34 वर्जन मिल जाएगा
      name: Force SDK Version 34 in Build Script
        run: |
          node -e "
          const fs = require('fs');
          const file = 'android/app/build.gradle';
          let content = fs.readFileSync(file, 'utf8');
          content = content.replace(/compileSdk\s+flutter\.compileSdkVersion/g, 'compileSdk 34');
          content = content.replace(/targetSdkVersion\s+flutter\.targetSdkVersion/g, 'targetSdkVersion 34');
          fs.writeFileSync(file, content, 'utf8');
          "
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      - name: Build VIP APK Freshly
        run: flutter build apk --release
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
