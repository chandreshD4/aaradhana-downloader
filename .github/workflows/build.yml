name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      # इस बार हम एंड्रॉयड फोल्डर को डिलीट नहीं कर रहे हैं, पुरानी सेटिंग को सुरक्षित रख रहे हैं
      - name: Force SDK 34 on existing Android project cleanly
        run: |
          cat << 'SUB' >> android/build.gradle
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdkVersion 34
                          targetSdkVersion 34
                      }
                  }
              }
          }
          SUB
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      - name: Build VIP APK Freshly
        run: flutter build apk --release
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/*.apk
