name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Re-generate Android Folder Safely
        run: |
          rm -rf android
          flutter create --org com.example --project-name=aaradhana_downloader --platforms=android .
          
      - name: Force Global SDK 34 for All Plugins
        run: |
          cat << 'SUB' >> android/build.gradle
          subprojects {
              afterEvaluate { project ->
                  if (project.hasProperty("android")) {
                      project.android {
                          compileSdk 34
                          defaultConfig {
                              targetSdk 34
                          }
                      }
                  }
              }
          }
          SUB
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      # फ्लटर के रास्ते के भरोसे रहने के बजाय, सीधे एंड्रॉयड के अंदर जाकर एपीके असेंबल करना
      - name: Build APK via Direct Gradle
        run: |
          cd android
          ./gradlew assembleRelease
        
      # अब किसी भी कोने में एपीके बनी हो, गिटहब उसे ढूंढकर अपलोड कर देगा
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: "**/build/app/outputs/apk/release/*.apk"
