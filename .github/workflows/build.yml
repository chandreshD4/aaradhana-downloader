name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Re-generate Android Folder Freshly
        run: |
          rm -rf android
          flutter create --org com.example --platforms=android .
          
      # सबसे सुरक्षित तरीका: सीधे local.properties में वर्जन 34 इंजेक्ट करना
      - name: Configure Android SDK Versions Cleanly
        run: |
          echo "flutter.compileSdkVersion=34" >> android/local.properties
          echo "flutter.targetSdkVersion=34" >> android/local.properties
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      - name: Build VIP APK Freshly
        run: flutter build apk --release
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
