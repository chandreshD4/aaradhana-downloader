name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Deep Clean Project
        run: |
          flutter clean
          flutter pub get
          
      - name: Build APK without V1 Check
        run: flutter build apk --release --no-pub
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
