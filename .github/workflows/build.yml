name: Build RajuBhai VIP APK
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Re-generate Android Folder Safely
        run: |
          rm -rf android
          flutter create --org com.example --project-name=aaradhana_downloader --platforms=android .
          
      - name: Install Project Dependencies
        run: flutter pub get
        
      # बिना किसी फाइल को रिप्लेस किए, सीधे कमांड से वर्जन 34 पर एपीके बिल्ड करना
      - name: Build VIP APK with Forced SDK 34
        run: flutter build apk --release --compile-sdk-version=34
        
      - name: Upload VIP APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aradhana-vip-apk
          path: build/app/outputs/flutter-apk/app-release.apk
